name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --wait
        env:
          APP_JWT_SECRET: nightly_test_secret_32_characters_long
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          PAYPAL_CLIENT_ID: placeholder
          PAYPAL_CLIENT_SECRET: placeholder

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/actuator/health && break
            sleep 5
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run Cypress E2E
        working-directory: frontend
        run: npx cypress run --config baseUrl=http://localhost:4200

      - name: Upload Cypress artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            frontend/cypress/screenshots
            frontend/cypress/videos

      - name: Tear down
        if: always()
        run: docker compose down -v
