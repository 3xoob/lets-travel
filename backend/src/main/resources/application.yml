spring:
  application:
    name: lets-travel

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/letstravel}
    username: ${SPRING_DATASOURCE_USERNAME:letstravel}
    password: ${SPRING_DATASOURCE_PASSWORD:letstravel_dev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: LetsTravel-HikariPool

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
    elasticsearch:
      repositories:
        enabled: true

  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}

  neo4j:
    uri: ${SPRING_NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
      password: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD:letstravel_dev}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 100
    connection-timeout: 20000
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024

app:
  jwt:
    secret: ${APP_JWT_SECRET:dev_secret_change_me_in_production_32chars}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  stripe:
    secret-key: ${APP_STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${APP_STRIPE_WEBHOOK_SECRET:whsec_placeholder}
    publishable-key: ${APP_STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
  paypal:
    client-id: ${APP_PAYPAL_CLIENT_ID:placeholder}
    client-secret: ${APP_PAYPAL_CLIENT_SECRET:placeholder}
    mode: ${APP_PAYPAL_MODE:sandbox}
  uploads:
    dir: ${APP_UPLOADS_DIR:/uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
